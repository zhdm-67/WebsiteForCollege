<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Контакты — Кафе «Утренний Свет»</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="brand">
                <a class="logo" href="index.html" aria-hidden="true">☼</a>
                <div>
                    <h1>Кафе «Утренний Свет»</h1>
                    <div class="muted">Связаться с нами</div>
                </div>
            </div>

            <nav aria-label="Главное меню">
                <a class="nav-link" href="index.html">Главная</a>
                <a class="nav-link" href="menu.html">Меню</a>
                <a class="nav-link" href="about.html">О нас</a>
                <a class="nav-link-selected" href="contact.html">Контакты</a>
            </nav>

            <div class="actions">
                <button class="btn" id="themeToggle4">Тема</button>
                <button class="btn primary" id="orderNow4">Заказать</button>
            </div>
        </header>

        <main>
            <section aria-labelledby="contact-title">
                <h3 id="contact-title" style="margin-top:8px">Контакты</h3>
                <p class="muted">Тел: +375 (00) 000-00-00</p>
                <p class="muted">Адрес: ул. Уютная, 10</p>

                <h4 style="margin-top:12px">Форма</h4>
                <form id="contactForm" class="contact-card" novalidate>
                    <div class="row">
                        <label class="field">
                            <span class="label">Имя</span>
                            <input type="text" name="name" required>
                            <span class="hint">Как к вам обращаться</span>
                        </label>

                        <label class="field">
                            <span class="label">Email</span>
                            <input type="email" name="email" required>
                            <span class="hint">Нужен для ответа</span>
                        </label>
                    </div>

                    <label class="field">
                        <span class="label">Сообщение</span>
                        <textarea name="msg" rows="5" required></textarea>
                        <span class="hint">Коротко опишите запрос</span>
                    </label>

                    <div class="form-actions">
                        <button class="btn" type="reset">Очистить</button>
                        <button class="btn primary" type="submit" id="contactSubmit">Отправить</button>
                    </div>
                </form>
                <div id="toast" class="toast" role="status" aria-live="polite" hidden>Сообщение отправлено</div>
            </section>
        </main>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
